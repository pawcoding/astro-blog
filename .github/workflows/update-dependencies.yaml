name: 🆙 Update dependencies
# Run this every saturday
on:
  schedule:
    - cron: "0 4 * * 6"
permissions:
  contents: read
jobs:
  update:
    # Use the latest version of Ubuntu
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      # Checkout repository
      - name: 📥 Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          ref: "master"

      # Install pnpm
      - name: 📦 Install pnpm
        uses: pnpm/action-setup@91ab88e2619ed1f46221f0ba42d1492c02baf788 # v6.0.6

      # Setup Node
      - name: 📦 Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: "pnpm"

      # Update dependencies
      - name: 🆙 Update dependencies
        run: |
          pnpm up

      # Restore cache
      - name: 📦 Restore cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          key: astro-cache
          path: |
            .astro

      # Check Astro
      - name: 🧪 Check Astro
        run: pnpm run prebuild
        env:
          MATOMO_URL: ${{ vars.MATOMO_URL }}
          MATOMO_SITE_ID: ${{ vars.MATOMO_SITE_ID }}

      # Create pull request
      - name: 🚀 Create pull request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "build(deps): update dependencies"
          sign-commits: true
          branch: "build/update-dependencies"
          delete-branch: true
          base: "master"
          title: "Update dependencies"
          body: "This PR updates dependencies."
          labels: "priority/medium,status/testing,team/internal,type/maintenance"
          reviewers: "pawcoding"
