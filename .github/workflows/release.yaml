name: 🚀 Publish new version
# Run this on every push to master
on:
  push:
    branches:
      - master
      - staging

env:
  HUSKY: 0

permissions:
  contents: read

jobs:
  release:
    # Use the latest version of Ubuntu
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      # Checkout repository
      - name: 📥 Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      # Install pnpm
      - name: 📦 Install pnpm
        uses: pnpm/action-setup@91ab88e2619ed1f46221f0ba42d1492c02baf788 # v6.0.6

      # Setup Node
      - name: 📦 Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: "pnpm"

      # Install dependencies
      - name: 📦 Install dependencies
        run: |
          pnpm ci

      # Restore cache
      - name: 📦 Restore cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          key: astro-cache
          path: |
            .astro

      # Create semantic release
      - name: 🚀 Create semantic release
        id: release
        uses: cycjimmy/semantic-release-action@b12c8f6015dc215fe37bc154d4ad456dd3833c90 # v6.0.0
        with:
          semantic_version: 25
          extra_plugins: |
            @semantic-release/changelog
            @semantic-release/git
            @semantic-release/exec
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          MATOMO_URL: ${{ vars.MATOMO_URL }}
          MATOMO_SITE_ID: ${{ vars.MATOMO_SITE_ID }}

      # Update project on website
      - name: 🖥️ Update website
        if: steps.release.outputs.new_release_published == 'true' && !steps.release.outputs.new_release_channel  && steps.release.outputs.new_release_patch_version == '0'
        uses: pawcoding/update-project-action@14441f968c2a3a245654b87976680b89fc482f74 # v0.0.5
        with:
          pocketbase-url: ${{ vars.PB_URL }}
          collection-id: ${{ vars.PB_COLLECTION }}
          record-id: ${{ vars.PB_RECORD }}
        env:
          PB_TOKEN: ${{ secrets.PB_TOKEN }}
