allowBuilds:
  "@tailwindcss/oxide": true
  esbuild: true
  sharp: true
# Only allow packages that are at least one week
minimumReleaseAge: 10080
# Except official astro packages and my own ones
minimumReleaseAgeExclude:
  - "@astrojs/*"
  - "astro"
  - "astro-loader-pocketbase"
  - "astro-integration-pocketbase"
  # Temporarily allow packages releases less than a week ago
  - "@napi-rs/wasm-runtime@1.1.6"
  - "@tybys/wasm-util@0.10.3"
trustPolicy: no-downgrade
trustPolicyExclude:
  - chokidar@4.0.3
  - semver@6.3.1
blockExoticSubdeps: true
trustLockfile: true
